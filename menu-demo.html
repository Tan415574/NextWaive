<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-orange-50 font-sans min-h-screen pb-20">
    <div class="h-48 bg-slate-800 flex items-end p-6 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&w=800&q=80')">
        <div class="bg-white p-4 rounded-xl shadow-lg translate-y-10 border border-orange-100 w-full flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">The Daily Grind</h1>
                <p class="text-xs text-slate-500 italic text-orange-600">Open until 9:00 PM</p>
            </div>
            <div class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">WhatsApp Ordering Active</div>
        </div>
    </div>

    <div class="mt-16 px-6 space-y-4">
        <h2 class="font-bold text-slate-800 border-b border-orange-200 pb-2">Popular Items</h2>
        
        <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-orange-100">
            <div>
                <h3 class="font-bold">Classic Cheeseburger</h3>
                <p class="text-sm text-slate-500">100% Beef, cheddar, secret sauce.</p>
                <p class="font-bold text-orange-600 mt-2 text-sm">R85.00</p>
            </div>
            <button class="bg-slate-900 text-white w-10 h-10 rounded-xl flex items-center justify-center">+</button>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-orange-100">
            <div>
                <h3 class="font-bold">Loaded Fries</h3>
                <p class="text-sm text-slate-500">Topped with jalapeños & cheese.</p>
                <p class="font-bold text-orange-600 mt-2 text-sm">R55.00</p>
            </div>
            <button class="bg-slate-900 text-white w-10 h-10 rounded-xl flex items-center justify-center">+</button>
        </div>
    </div>

    <div class="fixed bottom-6 left-6 right-6">
        <a href="https://wa.me/27784898868?text=I'd%20like%20to%20order%20from%20the%20Daily%20Grind" class="bg-green-500 text-white w-full py-4 rounded-2xl font-bold flex items-center justify-center shadow-xl shadow-green-200">
            <i class="fab fa-whatsapp mr-3 text-xl"></i> Order via WhatsApp
        </a>
    </div>
</body>
</html>
