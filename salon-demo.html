<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-white rounded-[2rem] shadow-2xl overflow-hidden border-8 border-slate-900">
        <div class="bg-[#075e54] p-4 flex items-center text-white">
            <i class="fas fa-chevron-left mr-4"></i>
            <div class="w-10 h-10 bg-slate-300 rounded-full mr-3"></div>
            <div>
                <p class="font-bold leading-none">Luxe Salon AI</p>
                <p class="text-xs text-emerald-400">Online</p>
            </div>
        </div>
        <div class="h-[500px] bg-[#e5ddd5] p-4 overflow-y-auto flex flex-col space-y-3">
            <div class="bg-white p-3 rounded-lg self-start max-w-[80%] text-sm shadow-sm">
                Hi there! Welcome to Luxe Salon. How can I help you today?
                <div class="flex flex-col mt-2 space-y-2">
                    <button class="bg-sky-100 text-sky-700 py-1 rounded border border-sky-200">Book Appointment</button>
                    <button class="bg-sky-100 text-sky-700 py-1 rounded border border-sky-200">Price List</button>
                </div>
            </div>
            <div class="bg-[#dcf8c6] p-3 rounded-lg self-end max-w-[80%] text-sm shadow-sm">
                I'd like to book a haircut for tomorrow.
            </div>
            <div class="bg-white p-3 rounded-lg self-start max-w-[80%] text-sm shadow-sm italic text-slate-500">
                AI is checking availability...
            </div>
            <div class="bg-white p-3 rounded-lg self-start max-w-[80%] text-sm shadow-sm">
                I have an opening at 2:00 PM tomorrow. Would you like to secure this slot?
            </div>
        </div>
        <div class="p-3 bg-slate-50 flex items-center">
            <div class="flex-1 bg-white rounded-full px-4 py-2 text-slate-400 text-sm border border-slate-200">Type a message...</div>
            <div class="ml-3 w-10 h-10 bg-[#128c7e] rounded-full flex items-center justify-center text-white"><i class="fas fa-paper-plane"></i></div>
        </div>
    </div>
</body>
</html>
